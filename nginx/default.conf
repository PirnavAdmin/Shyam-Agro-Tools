upstream shyam_agro_frontend {
    server frontend:80;
}

upstream shyam_agro_backend {
    server backend:8080;
}

server {
    listen 80;
    server_name shyamagrotools.com www.shyamagrotools.com 15.206.152.226;

    return 301 https://shyamagrotools.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shyamagrotools.com www.shyamagrotools.com;

    ssl_certificate /etc/letsencrypt/live/shyamagrotools.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shyamagrotools.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://shyam_agro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /swagger/ {
        proxy_pass http://shyam_agro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://shyam_agro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://shyam_agro_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
