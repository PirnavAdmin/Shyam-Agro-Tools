services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shyam-agro-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      EmailSettings__SmtpServer: ${SMTP_SERVER}
      EmailSettings__Port: ${SMTP_PORT}
      EmailSettings__SenderEmail: ${SMTP_SENDER_EMAIL}
      EmailSettings__Password: ${SMTP_PASSWORD}
    volumes:
      - backend_uploads:/app/wwwroot/uploads
    ports:
      - "${BACKEND_HOST_PORT:-5000}:8080"
    networks:
      - shyam-agro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_SITE_URL: ${SITE_URL}
        REACT_APP_AUTH_API_BASE_URL: ${API_BASE_URL}
        REACT_APP_CART_CHECKOUT_API_BASE_URL: ${API_BASE_URL}
        REACT_APP_WALLET_API_BASE_URL: ${API_BASE_URL}
        REACT_APP_SUPPORT_API_BASE_URL: ${API_BASE_URL}
        REACT_APP_TESTIMONIAL_API_BASE_URL: ${API_BASE_URL}
        REACT_APP_MANUAL_PAYMENT_MERCHANT_NAME: ${MANUAL_PAYMENT_MERCHANT_NAME}
        REACT_APP_MANUAL_PAYMENT_UPI_ID: ${MANUAL_PAYMENT_UPI_ID}
        REACT_APP_MANUAL_PAYMENT_ACCOUNT_HOLDER: ${MANUAL_PAYMENT_ACCOUNT_HOLDER}
        REACT_APP_MANUAL_PAYMENT_BANK_NAME: ${MANUAL_PAYMENT_BANK_NAME}
        REACT_APP_MANUAL_PAYMENT_ACCOUNT_NUMBER: ${MANUAL_PAYMENT_ACCOUNT_NUMBER}
        REACT_APP_MANUAL_PAYMENT_IFSC: ${MANUAL_PAYMENT_IFSC}
        REACT_APP_MANUAL_PAYMENT_BRANCH: ${MANUAL_PAYMENT_BRANCH}
    container_name: shyam-agro-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    networks:
      - shyam-agro-network

  nginx:
    image: nginx:1.27-alpine
    container_name: shyam-agro-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shyam-agro-network

networks:
  shyam-agro-network:
    driver: bridge

volumes:
  backend_uploads:
